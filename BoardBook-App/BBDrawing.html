<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: transparent;
            user-select: none;
        }
        #canvas {
            display: block;
            cursor: crosshair;
        }
        #toolbar {
            position: fixed;
            top: 60px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 10000;
            pointer-events: auto;
        }
        .tool-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        .tool-btn.active { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        
        .color-dot {
            width: 24px; height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            margin: 0 auto;
        }
        .color-dot.active { border-color: white; transform: scale(1.2); }
        
        #close-draw { background: #ef4444; margin-top: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const { ipcRenderer } = require('electron');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let drawing = false;
        let tool = 'pen';
        let color = '#000000';
        let lineWidth = 8;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.addEventListener('resize', resize);
        resize();

        function startDrawing(x, y) {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function moveDrawing(x, y) {
            if (!drawing) return;
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (tool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = lineWidth * 2; // Eraser is naturally thicker
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
            }
            
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        canvas.addEventListener('mousedown', (e) => startDrawing(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => moveDrawing(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', () => drawing = false);

        // Touch Support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            startDrawing(touch.clientX, touch.clientY);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            moveDrawing(touch.clientX, touch.clientY);
        });
        canvas.addEventListener('touchend', () => drawing = false);

        // Sidebar Remote Commands
        ipcRenderer.on('bb:apply-drawing-tool', (event, data) => {
            if (data.action === 'clear') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            if (data.tool) tool = data.tool;
            if (data.color) color = data.color;
            if (data.thickness) lineWidth = data.thickness;
            
            // Immediately apply composite operation for eraser
            if (tool === 'eraser') ctx.globalCompositeOperation = 'destination-out';
            else ctx.globalCompositeOperation = 'source-over';
        });

        ipcRenderer.on('bb:request-composite', (event, bgDataUrl) => {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            
            const bgImg = new Image();
            bgImg.onload = () => {
                tCtx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                tCtx.drawImage(canvas, 0, 0);
                ipcRenderer.send('bb:composite-result', tempCanvas.toDataURL('image/png'));
            };
            bgImg.src = bgDataUrl;
        });
    </script>
</body>
</html>
